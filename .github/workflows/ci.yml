name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Check formatting
        run: pnpm run format:check

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.ORACLE_SSH_PRIVATE_KEY }}" > ~/.ssh/oracle
          printf '%s\n' "${{ secrets.ORACLE_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/oracle

      - name: Deploy to Oracle
        env:
          ORACLE_SSH_HOST: ${{ secrets.ORACLE_SSH_HOST }}
          ORACLE_SSH_USER: ${{ secrets.ORACLE_SSH_USER }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/oracle -o BatchMode=yes -o StrictHostKeyChecking=yes "$ORACLE_SSH_USER@$ORACLE_SSH_HOST" "DEPLOY_SHA='$DEPLOY_SHA' bash -s" <<'REMOTE'
          set -euo pipefail

          export PATH=/home/ubuntu/.nvm/versions/node/v22.20.0/bin:/home/ubuntu/.bun/bin:$PATH

          cd /home/ubuntu/haxfootball-discord
          git fetch origin main
          git reset --hard "$DEPLOY_SHA"
          corepack enable
          pnpm install --frozen-lockfile
          pnpm run build
          sudo install -m 0644 deploy/systemd/haxfootball-discord.service /etc/systemd/system/haxfootball-discord.service
          sudo systemctl daemon-reload
          set -a
          . /home/ubuntu/haxfootball-discord/.env.production
          set +a
          pnpm run commands:deploy
          sudo systemctl restart haxfootball-discord
          systemctl is-active --quiet haxfootball-discord
          REMOTE

      - name: Print service logs on failure
        if: failure()
        env:
          ORACLE_SSH_HOST: ${{ secrets.ORACLE_SSH_HOST }}
          ORACLE_SSH_USER: ${{ secrets.ORACLE_SSH_USER }}
        run: |
          ssh -i ~/.ssh/oracle -o BatchMode=yes -o StrictHostKeyChecking=yes "$ORACLE_SSH_USER@$ORACLE_SSH_HOST" <<'REMOTE'
          systemctl status haxfootball-discord --no-pager -l || true
          journalctl -u haxfootball-discord -n 120 --no-pager || true
          REMOTE
